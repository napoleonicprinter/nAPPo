<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nAPPo Trails - Device Previewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --bg-panel: #161b22;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --border: #30363d;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            margin: 0;
            color: var(--text-primary);
        }

        .device-toggles {
            display: flex;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .device-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 8px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .device-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .device-btn.active {
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent);
        }

        .preview-container {
            flex: 1;
            display: flex;
            padding: 40px;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
            overflow: auto;
        }

        .device-frame {
            margin: auto;
            background: #000;
            border: 12px solid #21262d;
            border-radius: 24px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            display: flex;
        }

        .device-frame.pc {
            width: 100%;
            height: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .device-frame.tablet {
            width: 768px;
            height: 1024px;
        }

        .device-frame.smartphone {
            width: 375px;
            height: 812px;
            border-radius: 40px;
            border-width: 14px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--bg-color);
        }

        /* Icons */
        svg {
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>nAPPo Trails Previewer</h1>
        <div class="device-toggles">
            <button class="device-btn" onclick="setDevice('smartphone')" id="btn-smartphone">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                Mobile
            </button>
            <button class="device-btn" onclick="setDevice('tablet')" id="btn-tablet">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                Tablet
            </button>
            <button class="device-btn active" onclick="setDevice('pc')" id="btn-pc">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                PC
            </button>
        </div>
        <a href="/" target="_blank" style="color: var(--accent); text-decoration: none; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 4px;">
            Open App
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
        </a>
    </div>

    <div class="preview-container">
        <div id="deviceFrame" class="device-frame pc">
            <!-- Loads the React app from the root -->
            <iframe src="/"></iframe>
        </div>
    </div>

    <script>
        function setDevice(deviceType) {
            // Update button states
            document.querySelectorAll('.device-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${deviceType}`).classList.add('active');

            // Update frame class
            const frame = document.getElementById('deviceFrame');
            frame.className = `device-frame ${deviceType}`;
        }
    </script>
</body>
</html>
